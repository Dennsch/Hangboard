<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Volt Climb</title>

  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Volt Climb">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise"></div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <button class="header-btn" aria-label="Menu">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
          <rect y="0" width="22" height="2.5" rx="1.25" fill="currentColor"/>
          <rect y="6.75" width="16" height="2.5" rx="1.25" fill="currentColor"/>
          <rect y="13.5" width="10" height="2.5" rx="1.25" fill="currentColor"/>
        </svg>
      </button>
      <div class="brand">VOLT CLIMB</div>
      <button class="header-btn" aria-label="Profile">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="11" cy="8.5" r="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M4.5 18.5c.8-3 3.4-5 6.5-5s5.7 2 6.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- Target Grip Info -->
    <section class="grip-section">
      <div class="grip-section-label">TARGET GRIP POSITION</div>
      <div id="grip-name" class="grip-title">Half Crimp</div>
      <div class="grip-badges">
        <span id="level-badge" class="badge badge-accent">LEVEL 3 EDGE</span>
        <span id="depth-badge" class="badge badge-ghost">20MM DEPTH</span>
      </div>
    </section>

    <!-- Timer Ring -->
    <div class="timer-ring-wrap">
      <svg class="timer-ring" viewBox="0 0 300 300">
        <circle class="ring-track" cx="150" cy="150" r="130"/>
        <circle class="ring-progress" id="ring-progress" cx="150" cy="150" r="130"
          stroke-dasharray="816.8" stroke-dashoffset="816.8"/>
      </svg>
      <div class="timer-center">
        <div id="phase-label" class="phase-label">READY</div>
        <div id="timer-display" class="timer-display">00</div>
        <div class="timer-unit">SECONDS LEFT</div>
      </div>
    </div>

    <!-- Progress Card -->
    <div class="progress-card">
      <div class="progress-top">
        <div class="progress-left">
          <div class="progress-card-label">PROGRESS</div>
          <div class="progress-count">
            <span id="current-hang" class="progress-current">0</span>
            <span class="progress-sep">/20</span>
          </div>
        </div>
        <div class="progress-right">
          <div class="progress-card-label">STATUS</div>
          <div id="set-status" class="progress-status">SET 1 OF 4</div>
        </div>
      </div>
      <div class="grip-track" id="grip-track"></div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.6"/>
            <path d="M9 5v4l2.5 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="stat-label">AVG TENSION</div>
        <div id="avg-tension" class="stat-value">—</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M10 2L4 10h5l-1 6 7-9h-5l1-5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="stat-label">POWER INDEX</div>
        <div id="power-index" class="stat-value">—</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="reset-btn" class="ctrl-btn ctrl-ghost" aria-label="Reset">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3.5 10a6.5 6.5 0 1 1 1.6 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M3.5 14.5v-4.5h4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        RESET
      </button>
      <button id="start-btn" class="ctrl-btn ctrl-primary" aria-label="Start">
        <svg id="play-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M7.5 5L16.5 11 7.5 17V5z" fill="currentColor"/>
        </svg>
        <svg id="pause-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" style="display:none">
          <rect x="5" y="4" width="4" height="14" rx="1.5" fill="currentColor"/>
          <rect x="13" y="4" width="4" height="14" rx="1.5" fill="currentColor"/>
        </svg>
        <span id="start-label">START</span>
      </button>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" aria-label="Train">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 11h2M17 11h2M5 11a6 6 0 0 1 12 0M5 11a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="11" cy="11" r="1.5" fill="currentColor"/>
          <path d="M2 8.5l1.5 1L2 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 8.5l-1.5 1L20 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>TRAIN</span>
      </button>
      <button class="nav-item" aria-label="History">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="8.5" stroke="currentColor" stroke-width="1.8"/>
          <path d="M11 6v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3.5 7.5A8.5 8.5 0 0 1 7 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M2.5 5V8h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>HISTORY</span>
      </button>
      <button class="nav-item" aria-label="Metrics">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <polyline points="3,16 8,10 12,13 19,6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8" cy="10" r="1.5" fill="currentColor"/>
          <circle cx="12" cy="13" r="1.5" fill="currentColor"/>
          <circle cx="19" cy="6" r="1.5" fill="currentColor"/>
        </svg>
        <span>METRICS</span>
      </button>
      <button class="nav-item" aria-label="Gear">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M9 3.5c.5-1.5 3.5-1.5 4 0 .3.8 1.2 1.1 2 .7 1.4-.8 3 .8 2.2 2.2-.4.8-.1 1.7.7 2 1.5.5 1.5 3.5 0 4-.8.3-1.1 1.2-.7 2 .8 1.4-.8 3-2.2 2.2-.8-.4-1.7-.1-2 .7-.5 1.5-3.5 1.5-4 0-.3-.8-1.2-1.1-2-.7-1.4.8-3-.8-2.2-2.2.4-.8.1-1.7-.7-2-1.5-.5-1.5-3.5 0-4 .8-.3 1.1-1.2.7-2C5.2 5 6.8 3.4 8.2 4.2c.8.4 1.7.1 2-.7z" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="11" cy="11" r="2.5" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        <span>GEAR</span>
      </button>
    </nav>
  </div>

  <script type="module" src="./renderer.ts"></script>
</body>
</html>
