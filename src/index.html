<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangboard Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise"></div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="8" width="16" height="3" rx="1.5" fill="currentColor"/>
          <rect x="6" y="2" width="2" height="6" rx="1" fill="currentColor"/>
          <rect x="12" y="2" width="2" height="6" rx="1" fill="currentColor"/>
          <rect x="6" y="11" width="2" height="7" rx="1" fill="currentColor"/>
          <rect x="12" y="11" width="2" height="7" rx="1" fill="currentColor"/>
        </svg>
        <span>HANGBOARD</span>
      </div>
      <div class="protocol-badge">20 HANGS · 6 GRIP TYPES</div>
    </header>

    <!-- Main display -->
    <main class="main">
      <!-- Progress arc -->
      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 240 240">
          <circle class="ring-track" cx="120" cy="120" r="108"/>
          <circle class="ring-progress" id="ring-progress" cx="120" cy="120" r="108"
            stroke-dasharray="678.6" stroke-dashoffset="678.6"/>
        </svg>
        <div class="timer-center">
          <div id="phase-label" class="phase-label">READY</div>
          <div id="timer-display" class="timer-display">00:00</div>
          <div id="grip-name" class="grip-name">—</div>
        </div>
      </div>

      <!-- Session progress -->
      <div class="session-info">
        <div class="hang-counter">
          <span id="current-hang" class="count-num">0</span>
          <span class="count-sep">/</span>
          <span class="count-total">20</span>
        </div>
        <div class="count-label">HANGS COMPLETED</div>
      </div>

      <!-- Grip dots -->
      <div class="grip-track" id="grip-track">
        <!-- filled by JS -->
      </div>

      <!-- Next up -->
      <div class="next-up" id="next-up">
        <span class="next-label">NEXT</span>
        <span id="next-grip" class="next-grip">Half Crimp</span>
      </div>
    </main>

    <!-- Controls -->
    <footer class="controls">
      <button id="reset-btn" class="ctrl-btn ctrl-ghost" aria-label="Reset">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9a6 6 0 1 1 1.5 3.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M3 13.5V9h4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="start-btn" class="ctrl-btn ctrl-primary" aria-label="Start">
        <svg id="play-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M7 4.5L17.5 11 7 17.5V4.5z" fill="currentColor"/>
        </svg>
        <svg id="pause-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" style="display:none">
          <rect x="5" y="4" width="4" height="14" rx="1.5" fill="currentColor"/>
          <rect x="13" y="4" width="4" height="14" rx="1.5" fill="currentColor"/>
        </svg>
      </button>
      <div class="ctrl-spacer"></div>
    </footer>
  </div>

  <script type="module" src="./renderer.ts"></script>
</body>
</html>
