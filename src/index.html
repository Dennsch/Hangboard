<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangboard Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Settings Section -->
    <fieldset class="settings-frame">
      <legend>Settings</legend>
      <div class="settings-row">
        <label for="intervals">Intervals:</label>
        <input type="number" id="intervals" min="1" max="20" value="5">
      </div>
      <div class="settings-row">
        <label for="image-select">Image:</label>
        <button id="image-select">Select</button>
      </div>
      <div class="settings-row">
        <span id="image-label" class="image-label">none</span>
      </div>
    </fieldset>

    <!-- Display Section -->
    <div class="display-section">
      <h1 id="phase-text" class="phase-text">Ready</h1>
      <div id="timer-text" class="timer-text">00:00</div>
      <div id="counter-text" class="counter-text">Interval: 0 / 0</div>
      
      <!-- Image Display -->
      <fieldset class="image-frame">
        <legend>Finger Position</legend>
        <div class="image-container">
          <img id="grip-image" src="" alt="Finger Position">
        </div>
      </fieldset>
    </div>

    <!-- Button Section -->
    <div class="button-section">
      <button id="start-btn" class="btn btn-start">Start</button>
      <button id="pause-btn" class="btn btn-pause" disabled>Pause</button>
      <button id="reset-btn" class="btn btn-reset">Reset</button>
    </div>
  </div>

  <script src="../dist/renderer.js"></script>
</body>
</html>
