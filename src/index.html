<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangboard Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Settings Section -->
    <fieldset class="settings-frame">
      <legend>Settings</legend>
      <div class="settings-row">
        <span class="info-text">Fixed protocol: 20 hangs across 6 grip types</span>
      </div>
    </fieldset>

    <!-- Display Section -->
    <div class="display-section">
      <h1 id="phase-text" class="phase-text">Ready</h1>
      <div id="timer-text" class="timer-text">00:00</div>
      <div id="counter-text" class="counter-text">Interval: 0 / 0</div>
    </div>

    <!-- Button Section -->
    <div class="button-section">
      <button id="start-btn" class="btn btn-start">Start</button>
      <button id="pause-btn" class="btn btn-pause" disabled>Pause</button>
      <button id="reset-btn" class="btn btn-reset">Reset</button>
    </div>
  </div>

  <script type="module" src="./renderer.ts"></script>
</body>
</html>
